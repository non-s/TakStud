name: Build & Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Debug APK e publica na Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -x lint -x test -x detekt --stacktrace

      - name: Localizar e renomear APK
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK encontrado: $APK"
          mkdir -p dist
          cp "$APK" dist/TakStud.apk
          ls -lh dist/

      - name: Publicar na Release v1.0.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "TakStud v1.0.0"
          files: dist/TakStud.apk
          fail_on_unmatched_files: true
          token: ${{{{ secrets.GITHUB_TOKEN }}}}
