<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Pagina nao encontrada - TakStud</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #161b22;
      --text: #f0f6fc;
      --muted: #8b949e;
      --accent: #f0883e;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(100%, 560px);
      border: 1px solid rgba(240, 136, 62, 0.35);
      border-radius: 8px;
      background: var(--panel);
      padding: 32px;
    }
    p { color: var(--muted); line-height: 1.6; }
    .code { color: var(--accent); font: 700 0.9rem ui-monospace, SFMono-Regular, Consolas, monospace; }
    h1 { margin: 10px 0 12px; font-size: clamp(2rem, 6vw, 3rem); }
    a {
      display: inline-flex;
      margin-top: 16px;
      color: #0d1117;
      background: var(--accent);
      border-radius: 6px;
      padding: 12px 16px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="code">404 / TakStud</div>
    <h1>Pagina nao encontrada</h1>
    <p>O link pode ter mudado ou expirado. Volte ao painel inicial para continuar usando o TakStud.</p>
    <a href="/TakStud/">Voltar ao TakStud</a>
  </main>
</body>
</html>
