# Detekt Configuration
# https://detekt.dev/docs/introduction/configurations

build:
  maxIssues: -1
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7
  ComplexMethod:
    active: true
    threshold: 15

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  VariableNaming:
    active: true
  FunctionNaming:
    active: true
  ClassNaming:
    active: true
  PackageNaming:
    active: true

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 150
  ReturnCount:
    active: true
    max: 3
  WildcardImport:
    active: true
    excludeImports: []
  UseDataClass:
    active: false
